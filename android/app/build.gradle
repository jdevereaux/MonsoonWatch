plugins {
    id("com.android.application")
    id("com.facebook.react")
}

react {
    root = file("../../")
    reactNativeDir = file("../../node_modules/react-native")
    autolinkLibrariesWithApp()
}

android {
    namespace "com.monsoonwatch"
    compileSdk 35

    defaultConfig {
        applicationId "com.monsoonwatch.weather"
        minSdk 24
        targetSdk 35
        versionCode 4
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("MONSOON_UPLOAD_STORE_FILE") ?: "debug.keystore")
            storePassword System.getenv("MONSOON_UPLOAD_STORE_PASSWORD") ?: ""
            keyAlias System.getenv("MONSOON_UPLOAD_KEY_ALIAS") ?: ""
            keyPassword System.getenv("MONSOON_UPLOAD_KEY_PASSWORD") ?: ""
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packagingOptions {
        pickFirst "**/libc++_shared.so"
        pickFirst "**/libjsc.so"
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
}
