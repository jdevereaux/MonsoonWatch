plugins {
    id("com.android.application")
    id("com.facebook.react")
}

react {
    // The root of your React Native project
    root = file("../../")
    // The folder containing your JS entry file
    reactNativeDir = file("../../node_modules/react-native")
}

android {
    namespace "com.monsoonwatch"
    compileSdk 35

    defaultConfig {
        applicationId "com.monsoonwatch.weather"
        minSdk 24          // Android 7.0+ (covers 95%+ of active devices)
        targetSdk 35
        versionCode 3
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("MONSOON_UPLOAD_STORE_FILE") ?: "debug.keystore")
            storePassword System.getenv("MONSOON_UPLOAD_STORE_PASSWORD") ?: ""
            keyAlias System.getenv("MONSOON_UPLOAD_KEY_ALIAS") ?: ""
            keyPassword System.getenv("MONSOON_UPLOAD_KEY_PASSWORD") ?: ""
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packagingOptions {
        pickFirst "**/libc++_shared.so"
        pickFirst "**/libjsc.so"
    }
}

dependencies {
    // React Native core
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // Splash screen
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesAppBuildGradle(project)
