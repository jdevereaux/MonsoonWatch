name: Build Android App Bundle (AAB)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm install

      - name: Debug - find ReactExtension source
        run: |
          echo "=== Searching for ReactExtension class file ==="
          find node_modules/@react-native/gradle-plugin -iname "*ReactExtension*"
          echo "=== Printing its contents ==="
          find node_modules/@react-native/gradle-plugin -iname "*ReactExtension*.kt" -exec cat {} \;
      - name: Debug - inspect native_modules.gradle autolinking helpers
        run: |
          echo "=== Searching for autolinking settings helper ==="
          grep -n "def \|fun \|projectDir\|include(" node_modules/@react-native-community/cli-platform-android/native_modules.gradle | head -40
      - name: Debug - check Kotlin version requirements
        run: |
          echo "=== react-native-screens build.gradle Kotlin requirement ==="
          cat node_modules/react-native-screens/android/build.gradle | grep -i kotlin
          echo "=== Root project Kotlin version ==="
          grep kotlinVersion android/build.gradle
          echo "=== Installed Kotlin Gradle Plugin version available ==="
          find ~/.gradle -iname "*kotlin-gradle-plugin*.jar" 2>/dev/null | head -5
          - name: Debug - check Fresco version
        run: |
          echo "=== Fresco version referenced in react-native's build.gradle ==="
          grep -i fresco node_modules/react-native/ReactAndroid/build.gradle 2>/dev/null | head -10
          echo "=== React Native version installed ==="
          cat node_modules/react-native/package.json | grep '"version"'
      - name: Copy HTML asset into Android assets folder
        run: |
          mkdir -p android/app/src/main/assets
          cp src/assets/monsoon_weather_tracker.html android/app/src/main/assets/

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore
          echo "Secret length check (should be a large number, not 0):"
          echo -n "$KEYSTORE_B64" | wc -c
          printf '%s' "$KEYSTORE_B64" > android/app/keystore/monsoon-upload-key.b64
          base64 -d android/app/keystore/monsoon-upload-key.b64 > android/app/keystore/monsoon-upload-key.keystore
          echo "Decoded keystore file size (should be a few KB, not 0):"
          ls -la android/app/keystore/monsoon-upload-key.keystore

      - name: Build signed release AAB
        env:
          MONSOON_UPLOAD_STORE_FILE: keystore/monsoon-upload-key.keystore
          MONSOON_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MONSOON_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MONSOON_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          gradle bundleRelease --no-daemon

      - name: Upload AAB as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Also build a signed release APK for direct device testing
        env:
          MONSOON_UPLOAD_STORE_FILE: keystore/monsoon-upload-key.keystore
          MONSOON_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MONSOON_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MONSOON_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          gradle assembleRelease --no-daemon

      - name: Upload release APK as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
