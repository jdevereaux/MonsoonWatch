name: Build Android App Bundle (AAB)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm install
        - name: Debug - inspect react-native gradle plugin package
        run: |
          echo "=== Does the gradle-plugin folder exist? ==="
          ls -la node_modules/@react-native/gradle-plugin/ || echo "FOLDER MISSING"
          echo "=== Its settings.gradle.kts (if any) ==="
          cat node_modules/@react-native/gradle-plugin/settings.gradle.kts 2>/dev/null || echo "NO settings.gradle.kts"
          echo "=== Its build.gradle.kts (if any) ==="
          cat node_modules/@react-native/gradle-plugin/build.gradle.kts 2>/dev/null || echo "NO build.gradle.kts"
          echo "=== package.json version installed ==="
          cat node_modules/@react-native/gradle-plugin/package.json 2>/dev/null | grep version

      - name: Copy HTML asset into Android assets folder
        run: |
          mkdir -p android/app/src/main/assets
          cp src/assets/monsoon_weather_tracker.html android/app/src/main/assets/

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.6

      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore
          echo "Secret length check (should be a large number, not 0):"
          echo -n "$KEYSTORE_B64" | wc -c
          printf '%s' "$KEYSTORE_B64" > android/app/keystore/monsoon-upload-key.b64
          base64 -d android/app/keystore/monsoon-upload-key.b64 > android/app/keystore/monsoon-upload-key.keystore
          echo "Decoded keystore file size (should be a few KB, not 0):"
          ls -la android/app/keystore/monsoon-upload-key.keystore

      - name: Build signed release AAB
        env:
          MONSOON_UPLOAD_STORE_FILE: keystore/monsoon-upload-key.keystore
          MONSOON_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MONSOON_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MONSOON_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          gradle bundleRelease --no-daemon

      - name: Upload AAB as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Also build a debug APK for quick device testing
        run: |
          cd android
          gradle assembleDebug --no-daemon

      - name: Upload debug APK as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
